name: CI

# Always run the checks that catch build failures: typecheck, unit/component
# tests, then a production build. Runs on every push and pull request.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # The app reads these at request time (routes are force-dynamic), not
          # at build time, so placeholders are enough to compile.
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          GOOGLE_MAPS_API_KEY: placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
